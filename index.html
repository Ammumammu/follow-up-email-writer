<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FollowUp Mailer</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Inter', sans-serif;
            background-color: #0f172a;
            color: #ffffff;
            margin: 0;
            padding: 0;
            line-height: 1.6;
        }
        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 20px;
        }
        .header {
            text-align: center;
            padding: 50px 0;
        }
        .header h1 {
            font-size: 2.5rem;
            margin-bottom: 10px;
        }
        .header h2 {
            font-size: 1.5rem;
            opacity: 0.8;
        }
        .how-it-works {
            background-color: #1e293b;
            padding: 30px;
            border-radius: 8px;
            margin: 20px 0;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 20px;
        }
        .how-it-works div {
            text-align: center;
        }
        .how-it-works h3 {
            font-size: 1.2rem;
        }
        .how-it-works p {
            font-size: 1rem;
            opacity: 0.8;
        }
        .main-button {
            display: inline-block;
            background-color: #6366f1;
            color: #ffffff;
            padding: 10px 20px;
            border-radius: 5px;
            text-decoration: none;
            margin-top: 20px;
        }
        .main-button:hover {
            background-color: #4f46e5;
        }
        .tool-container {
            background-color: #1e293b;
            padding: 30px;
            border-radius: 8px;
            margin: 20px 0;
        }
        .tool-container select, .tool-container textarea, .tool-container button {
            display: block;
            width: 100%;
            padding: 10px;
            margin: 10px 0;
            border: 1px solid #334155;
            border-radius: 5px;
            background-color: #0f172a;
            color: #ffffff;
        }
        .tool-container textarea {
            height: 100px;
        }
        .paywall {
            background-color: #1e293b;
            padding: 30px;
            border-radius: 8px;
            margin: 20px 0;
            text-align: center;
        }
        .paywall h2 {
            font-size: 2rem;
        }
        .paywall p {
            font-size: 1rem;
            opacity: 0.8;
        }
        .pricing-tier {
            background-color: #0f172a;
            padding: 20px;
            border-radius: 8px;
            margin: 20px 0;
            display: inline-block;
            text-align: center;
            width: 300px;
            vertical-align: top;
        }
        .pricing-tier button {
            background-color: #6366f1;
            color: #ffffff;
            padding: 10px 20px;
            border-radius: 5px;
            border: none;
            cursor: pointer;
            margin-top: 20px;
        }
        .pricing-tier button:hover {
            background-color: #4f46e5;
        }
        .pricing-tier button.secondary {
            background-color: #4b5563;
        }
        .pricing-tier button.secondary:hover {
            background-color: #374151;
        }
        .pricing-tier p.price {
            font-size: 1.5rem;
            margin: 20px 0 10px;
        }
        .pricing-tier p.discounted-price {
            font-size: 1rem;
            opacity: 0.8;
            text-decoration: line-through;
        }
        .email-capture {
            margin-top: 20px;
        }
        .email-capture input[type="email"] {
            width: calc(100% - 40px);
            margin-right: 10px;
        }
        .email-capture button {
            padding: 10px 20px;
            border-radius: 5px;
            background-color: #6366f1;
            color: #ffffff;
            border: none;
            cursor: pointer;
        }
        .email-capture button:hover {
            background-color: #4f46e5;
        }
        .usage-nudge {
            background-color: #334155;
            color: #ffffff;
            padding: 10px 20px;
            text-align: center;
            position: fixed;
            bottom: 0;
            width: 100%;
            z-index: 1000;
        }
        .usage-nudge a {
            color: #6366f1;
            text-decoration: none;
        }
        .usage-nudge a:hover {
            text-decoration: underline;
        }
        @media (max-width: 768px) {
            .how-it-works {
                flex-direction: column;
            }
            .pricing-tier {
                display: block;
                margin: 20px auto;
            }
        }
    </style>
</head>
<body>
<div id="root"></div>

<script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
<script src="https://unpkg.com/babel-standalone@6/babel.min.js"></script>
<script type="text/babel">
    const CONFIG = {
        GROQ_KEY: 'CONFIG.GROQ_KEY',
        STRIPE_LINK_PRO: 'https://buy.stripe.com/placeholder-follow-up-email-writer',
        STRIPE_LINK_ANNUAL: 'https://buy.stripe.com/placeholder-follow-up-email-writer'
    };

    const posthogEvent = (eventName, properties = {}) => {
        console.log('PostHog Event:', eventName, properties);
        // In a real application, you would call PostHog here
    };

    const freeLimit = 2;
    let uses = 0;

    const LandingPage = () => {
        posthogEvent('tool_opened');
        return (
            <div className="container">
                <div className="header">
                    <h1>Follow-up Emails Stuck</h1>
                    <h2>Sales teams send effective follow-ups in minutes</h2>
                </div>
                <div className="how-it-works">
                    <div>
                        <h3>Choose template (5 sec)</h3>
                        <p>Select a pre-built template that fits your needs.</p>
                    </div>
                    <div>
                        <h3>Customize with suggestions (10 sec)</h3>
                        <p>Personalize your email with AI-generated suggestions.</p>
                    </div>
                    <div>
                        <h3>Get responses (instant)</h3>
                        <p>Engage leads instantly with effective follow-ups.</p>
                    </div>
                </div>
                <a href="#/tool" className="main-button">Send Smarter</a>
            </div>
        );
    };

    const ToolPage = () => {
        const [template, setTemplate] = React.useState('');
        const [suggestion, setSuggestion] = React.useState('');
        const [emailContent, setEmailContent] = React.useState('');

        React.useEffect(() => {
            posthogEvent('tool_used');
            if (uses + 1 >= freeLimit) {
                posthogEvent('free_limit_hit');
            } else if (uses === freeLimit - 1) {
                posthogEvent('usage_nudge_shown');
            }
        }, []);

        const fetchSuggestion = async () => {
            if (uses >= freeLimit) {
                return;
            }
            const response = await fetch('https://api.groq.com/v1/infer', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                    'Authorization': `Bearer ${CONFIG.GROQ_KEY}`
                },
                body: JSON.stringify({
                    model: 'llama-3.3-70b-versatile',
                    prompt: `Generate a follow-up email based on the template: ${template}`,
                    max_tokens: 100
                })
            });
            const data = await response.json();
            setSuggestion(data.choices[0].text.trim());
        };

        const generateEmail = () => {
            uses++;
            if (uses >= freeLimit) {
                posthogEvent('free_limit_hit');
            } else if (uses === freeLimit - 1) {
                posthogEvent('usage_nudge_shown');
            }
            setEmailContent(`${suggestion}\n\nGenerated by FollowUp Mailer — follow-up-email-writer.vercel.app`);
        };

        return (
            <div className="container">
                <div className="tool-container">
                    <select value={template} onChange={e => setTemplate(e.target.value)}>
                        <option value="">Select a template</option>
                        <option value="Initial Follow-up">Initial Follow-up</option>
                        <option value="Follow-up After Demo">Follow-up After Demo</option>
                        <option value="Follow-up After Meeting">Follow-up After Meeting</option>
                    </select>
                    <textarea value={emailContent} onChange={e => setEmailContent(e.target.value)} placeholder="Your email will appear here..."></textarea>
                    <button onClick={fetchSuggestion}>Get Suggestions</button>
                    <button onClick={generateEmail}>Generate Email</button>
                </div>
                {uses === freeLimit - 1 && <div className="usage-nudge">1 use left — <a href="#/paywall">upgrade for unlimited</a></div>}
                {uses >= freeLimit && <PaywallPage />}
            </div>
        );
    };

    const PaywallPage = () => {
        posthogEvent('paywall_shown');
        const [email, setEmail] = React.useState('');
        const [isAnnual, setIsAnnual] = React.useState(false);

        const handleEmailCapture = () => {
            posthogEvent('email_captured');
            alert('Email captured! You get 3 more free uses.');
            freeLimit += 3;
        };

        const handlePaymentClick = (tier) => {
            posthogEvent('payment_clicked', { tier });
            alert(`Redirecting to ${tier} payment page...`);
        };

        const handleViewTier = (tier) => {
            posthogEvent('upgrade_tier_viewed', { tier });
        };

        return (
            <div className="container">
                <div className="paywall">
                    <h2>Unlock Unlimited Follow-ups</h2>
                    <p>Choose your plan to get more follow-up emails and advanced features.</p>
                    <div className="pricing-tier">
                        <h3>Pro</h3>
                        <p className="price">${isAnnual ? 90 : 9}/mo</p>
                        {isAnnual && <p className="discounted-price">$9/mo</p>}
                        <button onClick={() => handlePaymentClick('pro')} className="main-button">Choose Pro</button>
                    </div>
                    <div className="pricing-tier">
                        <h3>Max</h3>
                        <p className="price">${isAnnual ? 270 : 27}/mo</p>
                        {isAnnual && <p className="discounted-price">$27/mo</p>}
                        <button onClick={() => handlePaymentClick('max')} className="main-button secondary">Choose Max</button>
                    </div>
                    <label>
                        <input type="checkbox" checked={isAnnual} onChange={() => setIsAnnual(!isAnnual)} />
                        Pay annually — save 2 months
                    </label>
                    <div className="email-capture">
                        <input type="email" value={email} onChange={e => setEmail(e.target.value)} placeholder="Enter your email for 3 free uses" />
                        <button onClick={handleEmailCapture}>Get Free Uses</button>
                    </div>
                </div>
                <div className="related-tools">
                    <h2>Related Tools</h2>
                    <div id="related-tools-container"></div>
                </div>
            </div>
        );
    };

    const App = () => {
        const [view, setView] = React.useState('landing');

        React.useEffect(() => {
            const hash = window.location.hash.substring(1);
            setView(hash || 'landing');
        }, []);

        React.useEffect(() => {
            if (view === 'paywall') {
                fetch('https://raw.githubusercontent.com/Ammumammu/agent-os/main/public/portfolio.json')
                    .then(response => response.json())
                    .then(data => {
                        const toolsContainer = document.getElementById('related-tools-container');
                        toolsContainer.innerHTML = data.slice(0, 3).map(tool => `
                            <div class="pricing-tier">
                                <h3>${tool.name}</h3>
                                <p>${tool.description}</p>
                                <a href="${tool.url}" target="_blank" rel="noopener noreferrer">Learn More</a>
                            </div>
                        `).join('');
                    });
            }
        }, [view]);

        return (
            <div>
                {view === 'landing' && <LandingPage />}
                {view === 'tool' && <ToolPage />}
                {view === 'paywall' && <PaywallPage />}
            </div>
        );
    };

    ReactDOM.render(<App />, document.getElementById('root'));
</script>
</body>
</html>
